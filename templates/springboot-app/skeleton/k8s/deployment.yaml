apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.appName }}
  namespace: ${{ values.appName }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ${{ values.appName }}

  template:
    metadata:
      labels:
        app: ${{ values.appName }}

    spec:
      containers:
      - name: ${{ values.appName }}

        image: 443407534093.dkr.ecr.us-east-1.amazonaws.com/springboot:${{ values.appName }}-latest

        ports:
        - containerPort: 8080
