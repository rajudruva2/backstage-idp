apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.appName }}
  namespace: ${{ values.appName }}

  annotations:
    alb.ingress.kubernetes.io/group.name: rajplatform
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb

  rules:
  - host: ${{ values.appName }}.rajplatform.online

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: ${{ values.appName }}

            port:
              number: 80
