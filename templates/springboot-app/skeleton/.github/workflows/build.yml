name: Build and Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::443407534093:role/GitHubActionsECRPushRole
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Build Docker Image
        env:
          ECR_REGISTRY: 443407534093.dkr.ecr.us-east-1.amazonaws.com
        run: |
          docker build \
            -t $ECR_REGISTRY/springboot:${IMAGE_NAME}-${GITHUB_SHA} \
            -t $ECR_REGISTRY/springboot:${IMAGE_NAME}-latest .

      - name: Push Docker Image
        env:
          ECR_REGISTRY: 443407534093.dkr.ecr.us-east-1.amazonaws.com
        run: |
          docker push $ECR_REGISTRY/springboot:${IMAGE_NAME}-${GITHUB_SHA}
          docker push $ECR_REGISTRY/springboot:${IMAGE_NAME}-latest
