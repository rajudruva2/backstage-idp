
app:
  title: Backstage
  baseUrl: https://backstage.rajplatform.online

organization:
  name: Raj Platform

backend:
  baseUrl: https://backstage.rajplatform.online

  listen:
    port: 7007

  trustProxy: true

  cors:
    origin: https://backstage.rajplatform.online
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg

    pluginDivisionMode: schema

    connection:
      host: postgres
      port: 5432
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

auth:
  environment: production

  providers:
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

        signIn:
          resolvers:
            - resolver: usernameMatchingUserEntityName

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration

  rules:
    - allow: [Component, System, API, Resource, Location, User, Group]

  locations:
    - type: file
      target: ./examples/entities.yaml

    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

kubernetes:
  serviceLocatorMethod:
    type: multiTenant

  clusterLocatorMethods:
    - type: config
      clusters:
        - name: eks-dev
          url: https://kubernetes.default.svc
          authProvider: serviceAccount
          skipTLSVerify: true

techdocs:
  builder: local

  generator:
    runIn: docker

  publisher:
    type: local

permission:
  enabled: true

proxy: {}

scaffolder: {}

mcpActions:
  name: Raj Platform Backstage
  description: Internal Developer Platform

