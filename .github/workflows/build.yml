name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: mvn clean package

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t rajvam6806/springboot-template:${{ github.sha }} \
            -t rajvam6806/springboot-template:latest .

      - name: Push Image
        run: |
          docker push rajvam6806/springboot-template:${{ github.sha }}
          docker push rajvam6806/springboot-template:latest
